<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vastu AI</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Razorpay -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body class="bg-gray-100">

  <!-- Navbar -->
  <nav class="bg-white shadow p-4 text-center">
    <h1 class="text-xl font-bold text-blue-600">VASTU AI</h1>
  </nav>

  <!-- Hero -->
  <div class="text-center py-10 px-4">
    <h1 class="text-3xl font-bold text-gray-800">
      AI Powered Vastu Advice 🏠
    </h1>
    <p class="text-gray-600 mt-2">
      Room select karo aur instant vastu tips pao
    </p>
  </div>

  <!-- Form -->
  <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow">

    <label class="font-semibold">Room Type</label>
    <select id="room" class="w-full p-3 border rounded-lg mt-2 mb-4">
      <option>Bedroom</option>
      <option>Kitchen</option>
      <option>Living Room</option>
      <option>Bathroom</option>
      <option>Office</option>
    </select>

    <label class="font-semibold">Direction</label>
    <select id="direction" class="w-full p-3 border rounded-lg mt-2 mb-4">
      <option>North</option>
      <option>South</option>
      <option>East</option>
      <option>West</option>
    </select>

    <!-- Buttons -->
    <button onclick="getVastu()" class="w-full bg-blue-600 text-white py-3 rounded-lg mb-3">
      Get AI Vastu Advice
    </button>

    <button onclick="downloadPDF()" class="w-full bg-green-600 text-white py-3 rounded-lg mb-3">
      Download PDF Report
    </button>

    <button onclick="payNow()" class="w-full bg-purple-600 text-white py-3 rounded-lg">
      Get Premium Report ₹29
    </button>

    <!-- Output -->
    <div id="output" class="mt-6 text-gray-700 whitespace-pre-line"></div>

  </div>

  <!-- Script -->
  <script>

    async function getVastu() {
      const room = document.getElementById("room").value;
      const direction = document.getElementById("direction").value;

      document.getElementById("output").innerText = "Generating AI advice... ⏳";

      try {
        const res = await fetch("/api/vastu", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ room, direction })
        });

        const data = await res.json();
        document.getElementById("output").innerText = data.result;

      } catch (err) {
        document.getElementById("output").innerText = "Error: " + err.message;
      }
    }

    async function downloadPDF() {
      const text = document.getElementById("output").innerText;

      if (!text) {
        alert("Pehle Vastu advice generate karo");
        return;
      }

      const res = await fetch("/api/pdf", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
      });

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      window.open(url);
    }

    function payNow() {
      var options = {
        key: "YOUR_RAZORPAY_KEY",
        amount: 2900,
        currency: "INR",
        name: "Vastu AI",
        description: "Premium Report",
        handler: function () {
          alert("Payment Successful 🎉");
        }
      };

      var rzp = new Razorpay(options);
      rzp.open();
    }

  </script>

</body>
</html>
